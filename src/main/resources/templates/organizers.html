<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Manage Organizers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #237381;">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">event tickets center</a>
    <a class="nav-link text-white" th:href="@{/}">Back to Home</a>
  </div>
</nav>

<div class="container mt-5">
  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Event Organizers</h5>
    </div>
    <div class="card-body">
      <table class="table table-striped table-hover">
        <thead>
        <tr>
          <th>ID</th>
          <th>Company Name</th>
          <th>Contact Person</th>
          <th>Email</th>
          <th>Phone</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${listOrganizers}">
          <td th:text="${o.id}"></td>
          <td class="fw-bold" th:text="${o.name}"></td>
          <td th:text="${o.contactPerson}"></td>
          <td th:text="${o.email}"></td>
          <td th:text="${o.phone}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Venues</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #237381;">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">event tickets center</a>
        <a class="nav-link text-white" th:href="@{/}">Back to Home</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Registered Venues</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Venue Name</th>
                    <th>Address</th>
                    <th>Capacity</th>
                    <th>Organizer</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${listVenues}">
                    <td th:text="${v.id}"></td>
                    <td class="fw-bold" th:text="${v.name}"></td>
                    <td th:text="${v.address}"></td>
                    <td><span class="badge bg-info text-dark" th:text="${v.capacity}"></span></td>
                    <td th:text="${v.organizer != null ? v.organizer.name : 'None'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #237381;">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">event tickets center</a>
        <a class="nav-link text-white" th:href="@{/}">Back to Home</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Write a Review</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/reviews/save}" th:object="${review}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Event Name</label>
                            <input type="text" class="form-control" th:field="*{eventName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Your Name</label>
                            <input type="text" class="form-control" th:field="*{userName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Rating (1-5)</label>
                            <input type="number" class="form-control" th:field="*{rating}" min="1" max="5" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Comment</label>
                            <textarea class="form-control" th:field="*{comment}" rows="3" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Submit Review</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">All Reviews</h5>
                </div>
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>Event</th>
                            <th>User</th>
                            <th>Rating</th>
                            <th>Comment</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="r : ${listReviews}">
                            <td th:text="${r.eventName}"></td>
                            <td th:text="${r.userName}"></td>
                            <td><span class="badge bg-warning text-dark" th:text="${r.rating} + ' Stars'"></span></td>
                            <td th:text="${r.comment}"></td>
                            <td>
                                <a th:href="@{/reviews/edit/{id}(id=${r.id})}" class="btn btn-sm btn-primary">Edit</a>
                                <a th:href="@{/reviews/delete/{id}(id=${r.id})}" class="btn btn-sm btn-danger">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>

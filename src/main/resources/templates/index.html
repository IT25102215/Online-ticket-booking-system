<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Tickets Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }
        /* Top Utility Bar */
        .utility-bar {
            background-color: #1a5c66;
            color: white;
            font-size: 0.8rem;
            text-align: center;
            padding: 5px 0;
        }
        /* Teal Navbar */
        .navbar {
            background-color: #237381;
            padding: 15px 0;
        }
        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 1.8rem;
            letter-spacing: -1px;
        }
        .nav-link {
            color: white !important;
            font-weight: bold;
            margin-left: 15px;
        }
        .nav-link:hover {
            opacity: 0.8;
        }
        /* Hero Section with Overlay Image */
        .hero-section {
            background: linear-gradient(rgba(35, 115, 129, 0.85), rgba(35, 115, 129, 0.85)), url('https://images.unsplash.com/photo-1459749411175-04bf5292ceea?q=80&w=1500') center/cover;
            color: white;
            padding: 80px 0;
            text-align: center;
        }
        .search-bar-container {
            max-width: 600px;
            margin: 0 auto 30px auto;
            position: relative;
        }
        .search-bar-container input {
            border-radius: 30px;
            padding: 15px 20px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .search-icon {
            position: absolute;
            right: 20px;
            top: 15px;
            color: #237381;
            font-size: 1.2rem;
            font-weight: bold;
        }
        /* Event Cards */
        .card {
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card-img-top {
            height: 180px;
            object-fit: cover;
        }
        .card-title {
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="utility-bar">
    Resale marketplace, prices may be above face value.
</div>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">event<i class="bi bi-ticket-detailed"></i>tickets<br><small style="font-size:0.9rem; font-weight:normal;">center</small></a>

        <div class="ms-auto d-none d-lg-flex">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#">Concerts</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Sports</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Venues</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Theater</a></li>
                <li class="nav-item"><a class="nav-link text-warning" th:href="@{/events}">Admin</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <div class="search-bar-container">
            <input type="text" class="form-control form-control-lg" placeholder="search artist, team, venue, or city">
            <i class="bi bi-search search-icon"></i>
        </div>
        <h1 class="display-4 fw-bold mb-2">Event Tickets Center</h1>
        <h3 class="fw-normal">Find tickets to any event</h3>
    </div>
</section>

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-dark m-0">Featured Event Tickets</h4>
        <div>
            <button class="btn btn-outline-secondary rounded-circle me-1"><i class="bi bi-chevron-left"></i></button>
            <button class="btn btn-outline-secondary rounded-circle"><i class="bi bi-chevron-right"></i></button>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
        <div class="col" th:each="event : ${events}">
            <a th:href="@{/book/{id}(id=${event.id})}" class="text-decoration-none">
                <div class="card h-100">
                    <img th:src="${event.imageUrl}" class="card-img-top" alt="Event Image">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${event.eventName}">Event Name</h5>
                        <p class="card-text text-muted small mb-0" th:text="${event.description}">Description</p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

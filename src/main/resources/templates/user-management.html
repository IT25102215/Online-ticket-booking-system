<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Online Event System - User Management</h2>

    <div class="card mb-5">
        <div class="card-header bg-primary text-white">
            <span th:text="${user.id == null} ? 'Add New User' : 'Update User'"></span>
        </div>
        <div class="card-body">
            <form th:action="@{/users/save}" th:object="${user}" method="POST" class="row g-3">
                <input type="hidden" th:field="*{id}" />
                <div class="col-md-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Phone</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Role</label>
                    <select th:field="*{role}" class="form-select">
                        <option value="Customer">Customer</option>
                        <option value="Organizer">Organizer</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">Save User</button>
                    <a th:href="@{/users}" class="btn btn-secondary">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-dark text-white">Registered Users</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${listUsers}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.email}"></td>
                    <td><span class="badge bg-info text-dark" th:text="${u.role}"></span></td>
                    <td>
                        <a th:href="@{/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-warning">Edit</a>
                        <a th:href="@{/users/delete/{id}(id=${u.id})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>

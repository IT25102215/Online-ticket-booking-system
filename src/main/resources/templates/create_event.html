<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm w-50 mx-auto">
        <div class="card-header bg-primary text-white">
            <h4>Create a New Event</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/events/save}" th:object="${event}" method="POST">
                <div class="mb-3">
                    <label>Event Name</label>
                    <input type="text" class="form-control" th:field="*{eventName}" required />
                </div>
                <div class="mb-3">
                    <label>Event Date</label>
                    <input type="date" class="form-control" th:field="*{eventDate}" required />
                </div>
                <div class="mb-3">
                    <label>Ticket Price (LKR)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{ticketPrice}" required />
                </div>
                <button type="submit" class="btn btn-success">Save Event</button>
                <a th:href="@{/events}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Tickets - Event Tickets Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #237381; padding: 15px 0; }
        .navbar-brand, .nav-link { color: white !important; font-weight: bold; }
        .ticket-card {
            background: white; border-left: 5px solid #237381;
            border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px; padding: 20px;
        }
        .event-name { color: #1a5c66; font-weight: bold; font-size: 1.3rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-5">
    <div class="container">
        <a class="navbar-brand" href="/">event tickets center</a>
        <div class="ms-auto d-flex">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link text-warning" href="/my-tickets">My Tickets</a>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 800px;">
    <h2 class="fw-bold mb-4">Purchase History</h2>

    <!-- Displays if database is empty -->
    <div th:if="${#lists.isEmpty(tickets)}" class="alert alert-info text-center">
        You haven't booked any tickets yet.
    </div>

    <!-- Dynamic List of Tickets from Database -->
    <div th:each="ticket : ${tickets}" class="ticket-card d-flex justify-content-between align-items-center">
        <div>
            <div class="text-muted small mb-1" th:text="'Order #' + ${ticket.id}"></div>
            <div class="event-name mb-2" th:text="${ticket.customerName} + ' - ' + ${ticket.quantity} + ' Tickets'"></div>
        </div>
        <div class="text-end">
            <span class="badge bg-success mb-2">Confirmed</span>

            <!-- The DELETE Action -->
            <form th:action="@{/cancel-ticket/{id}(id=${ticket.id})}" method="post">
                <button type="submit" class="btn btn-sm btn-outline-danger mt-3">Cancel Booking</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
